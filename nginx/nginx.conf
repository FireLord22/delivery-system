events {}

http {
    upstream api {
        server api:8080;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /swagger {
            proxy_pass http://api;
        }

        location /metrics {
            proxy_pass http://api;
        }
    }
}